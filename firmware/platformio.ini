; SentinelEdge — PlatformIO Configuration
; =========================================
; ESP32 firmware for edge TinyML fault detection.
;
; Environments:
;   [env:inference]   — Production: TFLite + all sensors + MQTT
;   [env:collection]  — Data collection: raw MPU6050 CSV via Serial only
;   [env:drift_check] — Feature drift validation: drift check + serial output

[platformio]
default_envs = inference

[env:base]
platform = espressif32
board    = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed  = 921600

; ─── Libraries ────────────────────────────────────────────────────────────────
lib_deps =
  ; MPU6050 — I2C 6-DOF accelerometer/gyroscope
  electroniccats/MPU6050@^1.3.0



  ; GPS parsing (NEO-6M via UART2)
  mikalhart/TinyGPSPlus@^1.0.3

  ; MQTT publish/subscribe
  knolleary/PubSubClient@^2.8

  ; JSON serialization for MQTT payloads
  bblanchon/ArduinoJson@^7.0.0

  ; FFT for feature extraction (rectangular window to match Python numpy)
  kosme/arduinoFFT@^2.0.0

  ; TensorFlow Lite Micro for ESP32
  tanakamasayuki/TensorFlowLite_ESP32@^1.0.0

; ─── Common build flags ────────────────────────────────────────────────────────
[env:common_flags]
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -O2

; ─── Production inference environment ─────────────────────────────────────────
[env:inference]
extends = env:base
build_flags =
  ${env:common_flags.build_flags}
  -DENV_INFERENCE=1
  ; Disable ESP32 Bluetooth to free ~60KB SRAM
  -DCONFIG_BT_ENABLED=0
  ; GPS simulation mode: uses fixed New Delhi coordinates (28.6139, 77.2090).
  ; Remove this line to switch to real NEO-6M GPS hardware.
  -DGPS_SIMULATION=1

; ─── Data collection environment (no TFLite, prints raw CSV) ──────────────────
[env:collection]
extends = env:base
build_flags =
  ${env:common_flags.build_flags}
  -DENV_COLLECTION=1
  -UENV_INFERENCE

; ─── Drift check environment (verifies Python↔C++ feature parity) ─────────────
[env:drift_check]
extends = env:base
build_flags =
  ${env:common_flags.build_flags}
  -DENV_INFERENCE=1
  -DDRIFT_CHECK_ENABLED=1

; ─── Board configuration ──────────────────────────────────────────────────────
board_build.partitions = default.csv
board_build.f_cpu       = 240000000L   ; 240MHz — max frequency for ESP32
board_build.f_flash     = 80000000L
board_build.flash_mode  = qio
